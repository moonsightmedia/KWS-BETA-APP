name: Build and Upload to TestFlight

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to build
        required: false
        default: codex/v2-design-refresh
        type: string

concurrency:
  group: ios-testflight
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  XCODE_WORKSPACE: ios/App/App.xcworkspace
  XCODE_SCHEME: App
  BUNDLE_ID: com.kletterwelt.beta

jobs:
  testflight:
    name: iOS TestFlight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Validate required secrets
        run: |
          set -eo pipefail
          missing=0
          for name in APPLE_TEAM_ID APPSTORE_ISSUER_ID APPSTORE_API_KEY_ID APPSTORE_API_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Add secrets at: Settings -> Secrets and variables -> Actions"
            echo "Guide: TESTFLIGHT_SETUP_MIT_ACCOUNT.md"
            exit 1
          fi
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web app and sync Capacitor iOS
        run: |
          npm run build
          npx cap sync ios

      - name: Install CocoaPods
        run: pod install --project-directory=ios/App

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Configure App Store Connect API key
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -eo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          printf '%s\n' "$APPSTORE_API_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APP_STORE_CONNECT_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_ISSUER_ID=$APPSTORE_ISSUER_ID" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_KEY_IDENTIFIER=$APPSTORE_API_KEY_ID" >> "$GITHUB_ENV"

      - name: Set unique build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" ios/App/App/Info.plist
          echo "Build number set to ${{ github.run_number }}"

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Prepare App Store code signing
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APP_STORE_CONNECT_API_KEY_IS_KEY_CONTENT_BASE64: "false"
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -eo pipefail
          API_KEY_JSON="$RUNNER_TEMP/app_store_connect_api_key.json"
          ruby -rjson -e 'puts JSON.pretty_generate({
            key_id: ENV.fetch("APP_STORE_CONNECT_API_KEY_KEY_ID"),
            issuer_id: ENV.fetch("APP_STORE_CONNECT_API_KEY_ISSUER_ID"),
            key: ENV.fetch("APP_STORE_CONNECT_API_KEY_KEY"),
            duration: 1200,
            in_house: false
          })' > "$API_KEY_JSON"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$API_KEY_JSON" >> "$GITHUB_ENV"

          if [ -n "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "Importing stored distribution certificate from GitHub secrets"
            echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/distribution.p12"
            security create-keychain -p "$RUNNER_TEMP" "$RUNNER_TEMP/build.keychain"
            security default-keychain -s "$RUNNER_TEMP/build.keychain"
            security unlock-keychain -p "$RUNNER_TEMP" "$RUNNER_TEMP/build.keychain"
            security import "$RUNNER_TEMP/distribution.p12" -k "$RUNNER_TEMP/build.keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP" "$RUNNER_TEMP/build.keychain"
          elif security find-identity -v -p codesigning | grep -q "Apple Distribution"; then
            echo "Apple Distribution certificate already present in keychain"
          else
            echo "Creating a new Apple Distribution certificate"
            fastlane run get_certificates api_key_path:"$API_KEY_JSON" development:false
            CERT_PASSWORD=$(openssl rand -base64 18)
            security export -t identities -f pkcs12 -P "$CERT_PASSWORD" -o "$RUNNER_TEMP/distribution.p12"
            echo "CERT_EXPORT_PASSWORD=$CERT_PASSWORD" >> "$GITHUB_ENV"
            echo "Created distribution certificate. Add it to GitHub secrets if this is your first successful cert export."
          fi

          fastlane run get_provisioning_profile api_key_path:"$API_KEY_JSON" app_identifier:"$BUNDLE_ID" force:true skip_install:false

          PROFILE_UUID=""
          PROFILE_FILE=""
          for f in "$PWD"/AppStore_${BUNDLE_ID}.mobileprovision \
                   "$PWD"/*.mobileprovision \
                   "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            [ -f "$f" ] || continue
            TMP="$RUNNER_TEMP/profile.plist"
            security cms -D -i "$f" 2>/dev/null > "$TMP" || continue
            APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$TMP" 2>/dev/null || true)
            BUNDLE="${APP_ID#*.}"
            if [ "$BUNDLE" = "$BUNDLE_ID" ]; then
              PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$TMP")
              PROFILE_FILE="$f"
              echo "Using provisioning profile UUID: $PROFILE_UUID (from $f)"
              break
            fi
          done
          if [ -z "$PROFILE_UUID" ]; then
            echo "::error::App Store provisioning profile for $BUNDLE_ID was not found after install"
            exit 1
          fi
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_FILE" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "IOS_PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Build App Store IPA with Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_PATH: ${{ env.APP_STORE_CONNECT_API_KEY_PATH }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APP_STORE_CONNECT_API_KEY_IS_KEY_CONTENT_BASE64: "false"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_UUID: ${{ env.IOS_PROVISIONING_PROFILE_UUID }}
        run: |
          set -eo pipefail
          mkdir -p ios/App/build/ipa
          EXPORT_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${IOS_PROVISIONING_PROFILE_UUID}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          fastlane run build_app \
            workspace:"$XCODE_WORKSPACE" \
            scheme:"$XCODE_SCHEME" \
            configuration:"Release" \
            export_method:"app-store" \
            output_directory:"ios/App/build/ipa" \
            output_name:"App" \
            clean:true \
            include_symbols:true \
            include_bitcode:false \
            export_team_id:"$APPLE_TEAM_ID" \
            export_options:"$EXPORT_PLIST" \
            xcargs:"PROVISIONING_PROFILE_SPECIFIER=$IOS_PROVISIONING_PROFILE_UUID CODE_SIGN_IDENTITY='Apple Distribution' CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=$APPLE_TEAM_ID"

      - name: Upload signing certificate backup
        if: env.CERT_EXPORT_PASSWORD != ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-distribution-cert-backup
          path: ${{ runner.temp }}/distribution.p12
          retention-days: 3

      - name: Resolve IPA path
        id: ipa
        run: |
          set -eo pipefail
          IPA_PATH="$(find ios/App/build/ipa -maxdepth 1 -name '*.ipa' | head -1)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA found after export"
            ls -la ios/App/build/ipa || true
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Exporting $IPA_PATH"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testflight-ipa-${{ github.run_number }}
          path: ios/App/build/ipa/*.ipa
          retention-days: 7
